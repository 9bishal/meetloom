name: Deploy Backend to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - 'package.json'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: ./server
        run: npm ci

      - name: Verify build
        working-directory: ./server
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-artifact
          path: server/
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    name: Deploy to App Service
    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-artifact
          path: server/

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'meetloom-api'
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: server/

      - name: Log deployment
        run: |
          echo "✅ Backend deployed successfully"
          echo "URL: https://meetloom-api.azurewebsites.net"
          echo "Health check: https://meetloom-api.azurewebsites.net/"

  post-deployment-tests:
    runs-on: ubuntu-latest
    needs: deploy
    name: Run Post-Deployment Tests
    steps:
      - uses: actions/checkout@v4

      - name: Wait for service to be ready
        run: |
          echo "Waiting for service to stabilize..."
          sleep 10

      - name: Health check
        run: |
          echo "Checking health endpoint..."
          response=$(curl -s -o /dev/null -w "%{http_code}" https://meetloom-api.azurewebsites.net/)
          if [ $response -eq 200 ]; then
            echo "✅ Health check passed (HTTP $response)"
          else
            echo "❌ Health check failed (HTTP $response)"
            exit 1
          fi

      - name: API endpoint check
        run: |
          echo "Checking API endpoints..."
          curl -s https://meetloom-api.azurewebsites.net/ | grep -q "MeetLoom API is running" && echo "✅ API is responding" || echo "⚠️ API response may have changed"
